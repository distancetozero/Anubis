{% extends "base.html" %}
{% block content %}
<div class="space-y-6">
    <h2 class="text-2xl font-bold">Disk Cleanup</h2>

    <!-- Scan results -->
    <div id="cleanup-scan" hx-get="/ui/partials/cleanup-scan" hx-trigger="load" hx-swap="innerHTML">
        <div class="flex justify-center p-8">
            <span class="loading loading-spinner loading-lg text-primary"></span>
            <span class="ml-3">Scanning temp files...</span>
        </div>
    </div>

    <!-- Recycle bin -->
    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
            <h3 class="card-title">Recycle Bin</h3>
            <div id="recycle-bin" hx-get="/ui/partials/recycle-bin" hx-trigger="load" hx-swap="innerHTML">
                <span class="loading loading-dots loading-sm"></span>
            </div>
        </div>
    </div>

    <!-- Disk Health -->
    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
            <h3 class="card-title">Disk Health (SMART)</h3>
            <div id="disk-health" hx-get="/ui/partials/disk-health" hx-trigger="load" hx-swap="innerHTML">
                <span class="loading loading-dots loading-sm"></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
